version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.4
    networks:
      - app-network
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.4
    networks:
      - app-network
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  mysql:
    image: mysql:8.3.0
    restart: always
    networks:
      - app-network

    environment:
      MYSQL_USER: test
      MYSQL_ROOT_USER: root
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: password

    ports:
      - "3306:3306"

    expose:
      - "3306"

    volumes:
      - mysql-db:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  auth-service:
    image: auth-service
    networks:
      - app-network
    ports:
      - "9898:9898"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: authservice
      MYSQL_USER: root
      MYSQL_PASSWORD: password
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started

  user-service:
    image: user-service
    networks:
      - app-network
    ports:
      - "9810:9810"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: userservice
      MYSQL_USER: root
      MYSQL_PASSWORD: password
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
      auth-service:
        condition: service_started

  expense-service:
    image: expense-service
    networks:
      - app-network
    ports:
      - "9820:9820"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: expenseservice
      MYSQL_USER: root
      MYSQL_PASSWORD: password
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started

  ds-service:
    image: ds-service
    networks:
      - app-network
    ports:
      - "8010:8010"
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      OPENAI_API_KEY: BeioYFDGyBPh5NlDTh7rLDP1i4qWsctm
    depends_on:
      kafka:
        condition: service_started
      expense-service:
        condition: service_started
      user-service:
        condition: service_started

  kong-service:
    image: kong:latest
    networks:
      - app-network
    volumes:
      - "./kong/config:/usr/local/kong/declarative"
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: "/usr/local/kong/declarative/kong.yml"
      KONG_PROXY_ACCESS_LOG: "/dev/stdout"
      KONG_ADMIN_ACCESS_LOG: "/dev/stdout"
      KONG_PROXY_ERROR_LOG: "/dev/stderr"
      KONG_ADMIN_ERROR_LOG: "/dev/stderr"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_LOG_LEVEL: "debug"
      KONG_PLUGINS: "bundled"
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      auth-service:
        condition: service_started

volumes:
  mysql-db:

networks:
  app-network:
